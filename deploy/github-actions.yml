name: BEKO Agent Production
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install groq pytest
      - run: python beko-agent-main.py
      - run: git config user.name github-actions
      - run: git config user.email actions@github.com
      - run: git add .
      - run: git commit -m "Auto: $(date)" || echo 'No changes'
      - run: git push