name: BEKO Agent Hourly
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: pip install groq pytest requests flask
      - name: Restore core agent file
        run: git checkout -- beko-agent-main.py || true
      - name: Run Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python beko-agent-main.py
      - name: Commit changes
        run: |
          git config user.name "BEKO Agent"
          git config user.email "kerkacem@github.com"
          git checkout -- beko-agent-main.py
          git add app.py plan.json skills/ logs/ memory/ metrics/ || true
          git diff --cached --quiet && echo "No changes" || git commit -m "Hourly BEKO: $(date)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
