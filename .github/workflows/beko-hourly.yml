name: BEKO Agent Hourly
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: pip install groq pytest requests
      - name: Run Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python beko-agent-main.py
      - name: Commit changes
        run: |
          git config user.name "BEKO Agent"
          git config user.email "kerkacem@github.com"
          git add .
          git commit -m "Hourly BEKO: $(date)" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
